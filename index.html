<!DOCTYPE html>
<html lang="am">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8">
    <title>Maezen Digital | AR Experience</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        :root {
            --brand-purple: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
        }

        body { margin: 0; overflow: hidden; font-family: 'Inter', 'Segoe UI', sans-serif; background-color: #000; }
        
        /* 1. Brand Loader Screen */
        #brand-loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 1s ease-in-out, visibility 1s;
        }

        .brand-text {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--brand-purple);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(20px);
            animation: revealText 0.8s forwards ease-out;
            letter-spacing: -1px;
        }

        @keyframes revealText {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 2. Scanning UI (Modern Look) */
        #ui-overlay {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            display: none; 
            flex-direction: column;
            align-items: center;
            transition: opacity 0.5s;
        }

        .instruction-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px 40px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            color: white;
        }

        .instruction-card p { margin: 0; font-size: 1.2rem; font-weight: 500; }

        /* 3. Ghost Guide */
        #ghost-guide {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 280px; height: 380px;
            border: 2px solid rgba(168, 85, 247, 0.3);
            border-radius: 20px;
            pointer-events: none;
            z-index: 500;
            display: none;
        }

        .pulse-ring {
            width: 60px; height: 60px;
            border: 3px solid #a855f7;
            border-radius: 50%;
            margin-bottom: 15px;
            animation: pulse 1.5s infinite ease-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.7); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
    </style>
</head>

<body>

    <div id="brand-loader">
        <div class="brand-text">Maezen Digital</div>
    </div>

    <div id="ghost-guide"></div>

    <div id="ui-overlay">
        <div class="pulse-ring"></div>
        <div class="instruction-card">
            <p>እባክዎን ካርዱን ስካን ያድርጉ</p>
            <span style="font-size: 0.8rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px;">Ready to Scan</span>
        </div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiError: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights, antialias: true, powerPreference: high-performance" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
      
        <a-assets>
            <a-asset-item id="myModel" src="./model.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient" intensity="1.2"></a-light>
        <a-light type="directional" position="1 2 1" intensity="0.8"></a-light>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-anchor" mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#myModel" position="0 0 0" rotation="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const loader = document.getElementById('brand-loader');
        const uiOverlay = document.getElementById('ui-overlay');
        const ghostGuide = document.getElementById('ghost-guide');
        const targetAnchor = document.getElementById('target-anchor');

        // Initial sequence
        window.addEventListener('load', () => {
            // Wait 1.5 seconds for the brand reveal, then fade out
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.visibility = 'hidden';
                    uiOverlay.style.display = 'flex';
                    ghostGuide.style.display = 'block';
                }, 1000); // Wait for fade animation to finish
            }, 1500);
        });

        // Tracking Logic
        targetAnchor.addEventListener("targetFound", () => {
            uiOverlay.style.opacity = '0';
            ghostGuide.style.display = 'none';
            if ("vibrate" in navigator) navigator.vibrate(50);
        });

        targetAnchor.addEventListener("targetLost", () => {
            uiOverlay.style.opacity = '1';
            ghostGuide.style.display = 'block';
        });
    </script>
</body>
</html>
